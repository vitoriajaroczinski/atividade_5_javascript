<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="form-inspecao">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome">

        <label for="email">E-mal:</label>
        <input type="email" id="email" name="email">

        <label for="setor">Setor</label>
        <select id="setor">
            <option value="">Selecione</option>
            <option value="operacao">Operação</option>
            <option value="manuntencao">Manutenção</option>
            <option value="seguranca">Segurança</option>
        </select>

        <p>Prioridade</p>
        <label><input type="radio" name="prioridade" value="baixa">Baixa</label>
        <label><input type="radio" name="prioridade" value="media">Media</label>
        <label><input type="radio" name="prioridade" value="alta">Alta</label>

        <label for="descricao">Descrição</label>
        <textarea id="descricao"></textarea>

        <label>
            <input type="checkbox" id="termos">Confirma as informações a serem enviadas?
        </label>

        <button type="submit">Enviar</button>

        <p id="mensagem"></p>
    </form>

    <script>
        const form = document.getElementById('form-inspecao');
        const mensagem = document.getElementById('mensagem');

        form.addEventListener('submit', function(event){
            event.preventDefault();
        });
    </script>
</body>
</html>
